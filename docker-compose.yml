services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - EMERGENCY_CONTACT=${EMERGENCY_CONTACT}
      - GEOCODING_API_KEY=${GEOCODING_API_KEY}
    # Volume mount enabled - for development
    volumes:
      - ./AI_SOS_SYSTEM/backend:/app/backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Optional: Create a .env file with your credentials
# cp env.example .env

